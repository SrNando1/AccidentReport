<!doctype html>
<html lang="pt">
  <head>
    <meta charset="utf-8" />
    <title>PDF Coordinate Picker</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 20px;
      }

      .wrap {
        position: relative;
        display: inline-block;
        border: 1px solid #ccc;
        line-height: 0;
      }

      img {
        display: block;
        max-width: 100%;
        height: auto;
      }

      .overlay {
        position: absolute;
        inset: 0;
        pointer-events: none;
      }

      .grid-line {
        position: absolute;
        background: rgba(120, 120, 120, 0.18);
      }

      .grid-line.major {
        background: rgba(90, 90, 90, 0.35);
      }

      .grid-label {
        position: absolute;
        font-size: 9px;
        color: #666;
        font-family: Consolas, monospace;
        pointer-events: none;
        background: rgba(255, 255, 255, 0.7);
        padding: 1px 2px;
      }

      .marker {
        position: absolute;
        width: 10px;
        height: 10px;
        background: red;
        border-radius: 50%;
        transform: translate(-50%, -50%);
        pointer-events: none;
        z-index: 20;
      }

      .marker.second {
        background: blue;
      }

      .box {
        position: absolute;
        border: 2px solid red;
        pointer-events: none;
        box-sizing: border-box;
        z-index: 19;
      }

      .field-box {
        position: absolute;
        border: 2px solid red;
        box-sizing: border-box;
        pointer-events: none;
        z-index: 10;
      }

      .field-label {
        position: absolute;
        font-size: 10px;
        color: red;
        font-weight: bold;
        background: rgba(255, 255, 255, 0.8);
        padding: 1px 3px;
        pointer-events: none;
        z-index: 11;
      }

      .text-point {
        position: absolute;
        width: 8px;
        height: 8px;
        background: blue;
        border-radius: 50%;
        transform: translate(-50%, -50%);
        pointer-events: none;
        z-index: 12;
      }

      .text-label {
        position: absolute;
        font-size: 10px;
        color: blue;
        background: rgba(255, 255, 255, 0.8);
        padding: 1px 3px;
        pointer-events: none;
        z-index: 13;
      }

      .panel {
        margin-top: 14px;
        padding: 12px;
        background: #f5f5f5;
        border: 1px solid #ddd;
        width: 820px;
        max-width: 100%;
        white-space: pre-wrap;
        font-family: Consolas, monospace;
      }

      .controls {
        margin-bottom: 12px;
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        align-items: center;
      }

      input {
        padding: 6px 8px;
        font-size: 14px;
        width: 180px;
      }

      button {
        padding: 6px 10px;
        font-size: 14px;
        cursor: pointer;
      }

      label.inline {
        display: flex;
        align-items: center;
        gap: 6px;
      }
    </style>

      function visualToPdf(rect, clickX, clickY) {
        const scaleX = PDF_WIDTH / rect.width;
        const scaleY = PDF_HEIGHT / rect.height;

        return {
          x: clickX * scaleX,
          y: PDF_HEIGHT - clickY * scaleY,
        };
      }

          fields: PAGE1_FIELDS,

      const pageImage = document.getElementById("pageImage");
      const pageSelect = document.getElementById("pageSelect");

      function getCurrentFields() {
        return PAGE_CONFIG[currentPage].fields;
      }

      function switchPage(pageNumber) {
        currentPage = Number(pageNumber);

        const config = PAGE_CONFIG[currentPage];
        pageImage.src = config.image;

        resetSelection(); // limpa cliques
        redrawOverlays(); // redesenha grid e caixas
      }

      pageSelect.addEventListener("change", (e) => {
        switchPage(e.target.value);
      });

      function pdfToVisual(rect, pdfX, pdfY) {
        const scaleX = rect.width / PDF_WIDTH;
        const scaleY = rect.height / PDF_HEIGHT;

        return {
          x: pdfX * scaleX,
          y: rect.height - pdfY * scaleY,
        };
      }

      function resetSelection() {
        firstClick = null;
        secondClick = null;
        marker1.style.display = "none";
        marker2.style.display = "none";
        box.style.display = "none";
        output.textContent = "À espera de cliques...";
      }

      function drawGrid() {
        gridLayer.innerHTML = "";
        if (!toggleGrid.checked) return;

        const rect = img.getBoundingClientRect();
        if (!rect.width || !rect.height) return;

        for (let x = 0; x <= PDF_WIDTH; x += 25) {
          const pos = pdfToVisual(rect, x, 0).x;
          const line = document.createElement("div");
          line.className = `grid-line ${x % 100 === 0 ? "major" : ""}`;
          line.style.left = `${pos}px`;
          line.style.top = `0px`;
          line.style.width = `${x % 100 === 0 ? 1.5 : 1}px`;
          line.style.height = `${rect.height}px`;
          gridLayer.appendChild(line);

          if (x < PDF_WIDTH) {
            const label = document.createElement("div");
            label.className = "grid-label";
            label.style.left = `${pos + 2}px`;
            label.style.top = `2px`;
            label.textContent = x;
            gridLayer.appendChild(label);
          }
        }

        for (let y = 0; y <= PDF_HEIGHT; y += 25) {
          const pos = pdfToVisual(rect, 0, y).y;
          const line = document.createElement("div");
          line.className = `grid-line ${y % 100 === 0 ? "major" : ""}`;
          line.style.left = `0px`;
          line.style.top = `${pos}px`;
          line.style.width = `${rect.width}px`;
          line.style.height = `${y % 100 === 0 ? 1.5 : 1}px`;
          gridLayer.appendChild(line);

          if (y < PDF_HEIGHT) {
            const label = document.createElement("div");
            label.className = "grid-label";
            label.style.left = `2px`;
            label.style.top = `${pos + 2}px`;
            label.textContent = y;
            gridLayer.appendChild(label);
          }
        }
      }

      function drawExistingFields() {
        fieldsLayer.innerHTML = "";
        if (!toggleFields.checked) return;

        const rect = img.getBoundingClientRect();
        if (!rect.width || !rect.height) return;

        Object.values(getCurrentFields()).forEach((field) => {
          const bottomLeft = pdfToVisual(rect, field.x, field.y);
          const topRight = pdfToVisual(
            rect,
            field.x + field.w,
            field.y + field.h,
          );
          const textPoint = pdfToVisual(rect, field.textX, field.textY);

          const fieldBox = document.createElement("div");
          fieldBox.className = "field-box";
          fieldBox.style.left = `${bottomLeft.x}px`;
          fieldBox.style.top = `${topRight.y}px`;
          fieldBox.style.width = `${topRight.x - bottomLeft.x}px`;
          fieldBox.style.height = `${bottomLeft.y - topRight.y}px`;
          fieldsLayer.appendChild(fieldBox);

          const fieldLabel = document.createElement("div");
          fieldLabel.className = "field-label";
          fieldLabel.style.left = `${bottomLeft.x + 2}px`;
          fieldLabel.style.top = `${topRight.y - 16}px`;
          fieldLabel.textContent = field.label;
          fieldsLayer.appendChild(fieldLabel);

          const point = document.createElement("div");
          point.className = "text-point";
          point.style.left = `${textPoint.x}px`;
          point.style.top = `${textPoint.y}px`;
          fieldsLayer.appendChild(point);

          const textLabel = document.createElement("div");
          textLabel.className = "text-label";
          textLabel.style.left = `${textPoint.x + 6}px`;
          textLabel.style.top = `${textPoint.y - 6}px`;
          textLabel.textContent = `${field.label} text`;
          fieldsLayer.appendChild(textLabel);
        });
      }

      function redrawOverlays() {
        drawGrid();
        drawExistingFields();
      }

      toggleGrid.addEventListener("change", drawGrid);
      toggleFields.addEventListener("change", drawExistingFields);
      window.addEventListener("resize", redrawOverlays);
      img.addEventListener("load", redrawOverlays);

      img.addEventListener("click", (e) => {
        const rect = img.getBoundingClientRect();
        const clickX = e.clientX - rect.left;
        const clickY = e.clientY - rect.top;

        const pdfPoint = visualToPdf(rect, clickX, clickY);

        if (!firstClick) {
          firstClick = {
            visualX: clickX,
            visualY: clickY,
            pdfX: pdfPoint.x,
            pdfY: pdfPoint.y,
          };

          marker1.style.display = "block";
          marker1.style.left = `${clickX}px`;
          marker1.style.top = `${clickY}px`;

          output.textContent = `Primeiro clique registado.

          Visual:
          x = ${clickX.toFixed(2)}
          y = ${clickY.toFixed(2)}

          PDF:
          x = ${pdfPoint.x.toFixed(2)}
          y = ${pdfPoint.y.toFixed(2)}

          Agora faz o 2º clique no canto superior direito do campo.`;
          return;
        }

        secondClick = {
          visualX: clickX,
          visualY: clickY,
          pdfX: pdfPoint.x,
          pdfY: pdfPoint.y,
        };

        marker2.style.display = "block";
        marker2.style.left = `${clickX}px`;
        marker2.style.top = `${clickY}px`;

        const left = Math.min(firstClick.visualX, secondClick.visualX);
        const top = Math.min(firstClick.visualY, secondClick.visualY);
        const width = Math.abs(secondClick.visualX - firstClick.visualX);
        const height = Math.abs(secondClick.visualY - firstClick.visualY);

        box.style.display = "block";
        box.style.left = `${left}px`;
        box.style.top = `${top}px`;
        box.style.width = `${width}px`;
        box.style.height = `${height}px`;

        const fieldX = Math.min(firstClick.pdfX, secondClick.pdfX);
        const fieldY = Math.min(firstClick.pdfY, secondClick.pdfY);
        const fieldW = Math.abs(secondClick.pdfX - firstClick.pdfX);
        const fieldH = Math.abs(secondClick.pdfY - firstClick.pdfY);

        const textX = fieldX + 5;
        const textY = fieldY + 3;

        const fieldName = (fieldNameInput.value || "campo").trim();

        const pageImage = document.getElementById("pageImage");
        const pageSelect = document.getElementById("pageSelect");

        output.textContent = `Campo: ${fieldName}

      1º clique (canto inferior esquerdo)
      Visual:
      x = ${firstClick.visualX.toFixed(2)}
      y = ${firstClick.visualY.toFixed(2)}

      PDF:
      x = ${firstClick.pdfX.toFixed(2)}
      y = ${firstClick.pdfY.toFixed(2)}

      2º clique (canto superior direito)
      Visual:
      x = ${secondClick.visualX.toFixed(2)}
      y = ${secondClick.visualY.toFixed(2)}

      PDF:
      x = ${secondClick.pdfX.toFixed(2)}
      y = ${secondClick.pdfY.toFixed(2)}

      Campo calculado:
      x = ${fieldX.toFixed(2)}
      y = ${fieldY.toFixed(2)}
      width = ${fieldW.toFixed(2)}
      height = ${fieldH.toFixed(2)}

      Texto sugerido:
      textX = ${textX.toFixed(2)}
      textY = ${textY.toFixed(2)}

      Pronto para colar:
      Página ${currentPage}
      ${fieldName}: {
        x: ${Math.round(fieldX)},
        y: ${Math.round(fieldY)},
        w: ${Math.round(fieldW)},
        h: ${Math.round(fieldH)},
        textX: ${Math.round(textX)},
        textY: ${Math.round(textY)},
        label: "${fieldName}",
      },`;

        firstClick = null;
        secondClick = null;
      });

      redrawOverlays();
    </script>
  </body>
</html>
